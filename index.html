    <style>
        :root {
            /* Paleta Amigable y Minimalista */
            --bg-main: #f9fafb; 
            --text-main: #4a5568; 
            --text-muted: #a0aec0; 
            --accent-friendly: #4fd1c5; 
            --accent-hover: #319795; 
            --card-bg: #ffffff;
            --border-color: #edf2f7; 
            --note-text: #dd6b20; 
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 60px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 650px;
        }

        h1 {
            font-size: 1.25rem;
            margin-bottom: 10px;
            text-align: center;
            font-weight: 500;
            color: var(--text-main);
            opacity: 0.8;
        }
        
        .subtitle {
            font-size: 0.9rem;
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 40px;
        }

        /* Selector Minimalista */
        .selector-box {
            background: transparent;
            padding: 0;
            margin-bottom: 40px;
            text-align: center;
        }

        .select-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 400px;
        }

        select {
            width: 100%;
            padding: 12px 15px;
            border: none;
            border-bottom: 2px solid var(--border-color);
            border-radius: 0;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-main);
            cursor: pointer;
            outline: none;
            background-color: transparent;
            transition: border-color 0.3s ease;
            appearance: none; 
            -webkit-appearance: none;
        }

        select:focus {
            border-color: var(--accent-friendly);
        }

        .select-wrapper::after {
            content: '\25BC';
            font-size: 0.7rem;
            color: var(--text-muted);
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        /* Tarjeta de Resultados Flat */
        .result-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid var(--border-color);
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tour-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .tour-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--accent-friendly);
            letter-spacing: -0.5px;
        }

        .pax-entry {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        .pax-entry:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .data-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }

        .data-item {
            font-size: 0.95rem;
        }

        .label {
            display: block;
            font-weight: 500;
            color: var(--text-muted);
            font-size: 0.75rem;
            margin-bottom: 3px;
        }

        .value {
            font-size: 1.05rem;
            font-weight: 400;
            color: var(--text-main);
        }

        /* Notas destacadas de forma suave */
        .notes-section {
            grid-column: 1 / -1;
            margin-top: 10px;
            background-color: var(--bg-main);
            padding: 15px;
            border-radius: 8px;
        }

        .note-item {
            font-size: 0.85rem;
            color: var(--text-main);
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .note-item:last-child { margin-bottom: 0; }

        .note-critical {
            color: var(--note-text);
            font-weight: 500;
        }
    </style>
</head>
