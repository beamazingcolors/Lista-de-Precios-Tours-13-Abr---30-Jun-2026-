<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Buscador de Tours en Tiempo Real</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-color: #f9fafb; color: #333; padding: 2rem; display: flex; justify-content: center; }
  .container { width: 100%; max-width: 600px; }
  h2 { font-size: 24px; font-weight: 600; margin-bottom: 8px; color: #111; }
  .subtitle { font-size: 14px; color: #666; margin-bottom: 24px; }
  .search-box { position: relative; width: 100%; margin-bottom: 24px; }
  input[type="text"] { width: 100%; padding: 14px 16px; border: 1px solid #e5e7eb; border-radius: 10px; font-size: 16px; outline: none; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.05); box-sizing: border-box; transition: border 0.2s; }
  input[type="text"]:focus { border-color: #3b82f6; }
  .card { background: #fff; border: 1px solid #edf2f7; border-radius: 10px; padding: 18px; margin-bottom: 14px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .tour-title { font-size: 16px; font-weight: 600; color: #1a202c; margin: 0; max-width: 70%; }
  .passenger-type { font-size: 12px; font-weight: 500; background: #eff6ff; color: #1d4ed8; padding: 4px 10px; border-radius: 20px; }
  .operator { font-size: 12px; color: #718096; margin-top: 2px; block-size: auto; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; font-size: 14px; border-top: 1px dashed #edf2f7; padding-top: 12px; }
  .grid div { background: #f8fafc; padding: 10px; border-radius: 6px; border: 1px solid #f1f5f9; }
  .grid div span { display: block; font-size: 10px; color: #94a3b8; text-transform: uppercase; font-weight: 600; margin-bottom: 4px; }
  .notes { margin-top: 12px; font-size: 13px; color: #475569; background: #fefcbf; padding: 12px; border-radius: 6px; border-left: 4px solid #ecc94b; line-height: 1.4; }
  .loading { text-align: center; color: #94a3b8; font-size: 14px; margin-top: 20px; }
</style>
</head>
<body>

<div class="container">
  <h2>Buscador de Tours</h2>
  <div class="subtitle">Escribe para filtrar los precios en tiempo real desde Google Sheets</div>
  
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Ej: Xcaret, Chichén, Catamarán..." disabled>
  </div>

  <div id="results">
    <div class="loading" id="statusMessage">Conectando con Google Sheets...</div>
  </div>
</div>

<script src="https://www.google.com/charts/loader.js"></script>
<script>
  // REEMPLAZA ESTE ID CON EL DE TU DOCUMENTO
  const SHEET_ID = '1bwy5_EwTYsKXAEInHRG8UjulfK7JxP8IHV0XLuMKyzk/edit?usp=sharing';
  const SHEET_NAME = 'Lista de Precios Tours (13 Abr - 30 Jun 2026)'; 
  
  let toursData = [];

  google.charts.load('current', {packages:['corechart']});
  google.charts.setOnLoadCallback(init);

  function init() {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?sheet=${encodeURIComponent(SHEET_NAME)}&tqx=out:json`;
    
    fetch(url)
      .then(res => res.text())
      .then(text => {
        // Limpiar la respuesta para convertirla en JSON válido
        const jsonString = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
        const data = JSON.parse(jsonString);
        
        processData(data.table);
      })
      .catch(err => {
        document.getElementById('statusMessage').textContent = 'Error al conectar con la base de datos.';
        console.error(err);
      });
  }

  function processData(table) {
    const rows = table.rows;
    // Mapeo dinámico de columnas basándonos en tu estructura de Sheet
    toursData = rows.map(row => ({
      operator: row.c[0] ? row.c[0].v : '',
      tour: row.c[1] ? row.c[1].v : '',
      passenger: row.c[2] ? row.c[2].v : '',
      intlPrice: row.c[3] ? row.c[3].f || row.c[3].v : '-',
      nacPrice: row.c[4] ? row.c[4].f || row.c[4].v : '-',
      exchange: row.c[5] ? row.c[5].f || row.c[5].v : '-',
      notes1: row.c[6] ? row.c[6].v : '',
      notes2: row.c[7] ? row.c[7].v : ''
    })).filter(item => item.tour !== '' && item.tour !== 'Tour / Parque'); // Filtrar cabeceras o filas vacías

    // Activar el input una vez cargados los datos
    const input = document.getElementById('searchInput');
    input.disabled = false;
    input.placeholder = "Comienza a escribir un tour o parque...";
    document.getElementById('statusMessage').textContent = 'Escribe algo para ver los tours disponibles.';

    input.addEventListener('input', renderResults);
  }

  function renderResults() {
    const query = document.getElementById('searchInput').value.toLowerCase().trim();
    const resultsContainer = document.getElementById('results');
    resultsContainer.innerHTML = '';

    if (query === '') {
      resultsContainer.innerHTML = '<div class="loading">Escribe algo para ver los tours disponibles.</div>';
      return;
    }

    const filtered = toursData.filter(item => 
      item.tour.toLowerCase().includes(query) || 
      item.operator.toLowerCase().includes(query)
    );

    if (filtered.length === 0) {
      resultsContainer.innerHTML = '<div class="loading">No se encontraron resultados para tu búsqueda.</div>';
      return;
    }

    filtered.forEach(item => {
      const card = document.createElement('div');
      card.className = 'card';
      
      // Combinar notas si ambas existen
      let notasCombinadas = [item.notes1, item.notes2].filter(n => n).join(' | ');

      let html = `
        <div class="card-header">
          <div>
            <h3 class="tour-title">${item.tour}</h3>
            <div class="operator">${item.operator}</div>
          </div>
          <span class="passenger-type">${item.passenger}</span>
        </div>
        <div class="grid">
          <div><span>Precio Intl</span> ${item.intlPrice}</div>
          <div><span>Precio Nac</span> ${item.nacPrice}</div>
          <div><span>T. Cambio</span> ${item.exchange}</div>
        </div>
      `;

      if (notasCombinadas) {
        html += `<div class="notes"><strong>Inclusiones / Notas:</strong> ${notasCombinadas}</div>`;
      }

      card.innerHTML = html;
      resultsContainer.appendChild(card);
    });
  }
</script>
</body>
</html>
