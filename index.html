<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Catálogo de Precios Tours</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-color: #f9fafb; color: #333; padding: 2rem; display: flex; justify-content: center; }
  .container { width: 100%; max-width: 600px; }
  h2 { font-size: 24px; font-weight: 600; margin-bottom: 8px; color: #111; }
  .subtitle { font-size: 14px; color: #666; margin-bottom: 24px; }
  .select-box { position: relative; width: 100%; margin-bottom: 24px; }
  select { width: 100%; padding: 14px 16px; border: 1px solid #e5e7eb; border-radius: 10px; font-size: 16px; outline: none; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.05); box-sizing: border-box; cursor: pointer; appearance: none; -webkit-appearance: none; }
  .select-box::after { content: "▼"; font-size: 12px; color: #94a3b8; position: absolute; right: 16px; top: 18px; pointer-events: none; }
  select:focus { border-color: #3b82f6; }
  .card { background: #fff; border: 1px solid #edf2f7; border-radius: 10px; padding: 18px; margin-bottom: 14px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.02); }
  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
  .tour-title { font-size: 16px; font-weight: 600; color: #1a202c; margin: 0; max-width: 70%; }
  .passenger-type { font-size: 12px; font-weight: 500; background: #eff6ff; color: #1d4ed8; padding: 4px 10px; border-radius: 20px; }
  .operator { font-size: 12px; color: #718096; margin-top: 2px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; font-size: 14px; border-top: 1px dashed #edf2f7; padding-top: 12px; }
  .grid div { background: #f8fafc; padding: 10px; border-radius: 6px; border: 1px solid #f1f5f9; }
  .grid div span { display: block; font-size: 10px; color: #94a3b8; text-transform: uppercase; font-weight: 600; margin-bottom: 4px; }
  .notes { margin-top: 12px; font-size: 13px; color: #475569; background: #fffbeb; padding: 12px; border-radius: 6px; border-left: 4px solid #f59e0b; line-height: 1.4; }
  .loading { text-align: center; color: #94a3b8; font-size: 14px; margin-top: 20px; }
</style>
</head>
<body>

<div class="container">
  <h2>Precios de Tours</h2>
  <div class="subtitle">Selecciona una opción para desplegar las tarifas vigentes</div>
  
  <div class="select-box">
    <select id="tourSelect" disabled>
      <option value="">Conectando base de datos...</option>
    </select>
  </div>

  <div id="results">
    <div class="loading" id="statusMessage">Cargando catálogo...</div>
  </div>
</div>

<script>
  const SHEET_ID = '1bwy5_EwTYsKXAEInHRG8UjulfK7JxP8IHV0XLuMKyzk';
  let toursData = [];

  document.addEventListener('DOMContentLoaded', () => {
    init();
  });

  function init() {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
    
    fetch(url)
      .then(res => {
        if (!res.ok) throw new Error('Error de red');
        return res.text();
      })
      .then(text => {
        try {
          const jsonString = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
          const data = JSON.parse(jsonString);
          processData(data.table);
        } catch (e) {
          document.getElementById('statusMessage').textContent = 'Error al procesar los datos de la nube.';
          console.error(e);
        }
      })
      .catch(err => {
        document.getElementById('statusMessage').textContent = 'Error de conexión. Revisa los permisos del Sheet.';
        console.error(err);
      });
  }

  function processData(table) {
    if (!table || !table.rows) return;
    
    const rows = table.rows;
    
    toursData = rows.map(row => {
      const getVal = (index, prop = 'v') => (row.c && row.c[index]) ? row.c[index][prop] : '';
      const getPrice = (index) => (row.c && row.c[index]) ? (row.c[index].f || row.c[index].v) : '-';

      return {
        operator: getVal(0),
        tour: getVal(1),
        passenger: getVal(2),
        intlPrice: getPrice(3),
        nacPrice: getPrice(4),
        exchange: getPrice(5),
        notes: getVal(6)
      };
    }).filter(item => item.tour && item.tour !== 'Tour / Parque' && item.tour.trim() !== '');

    // Obtener tours únicos de la columna B y ordenarlos alfabéticamente
    const uniqueTours = [...new Set(toursData.map(item => item.tour.trim()))].sort();

    const select = document.getElementById('tourSelect');
    select.innerHTML = '<option value="">Elige un Tour / Parque...</option>';
    
    uniqueTours.forEach(tour => {
      const option = document.createElement('option');
      option.value = tour;
      option.textContent = tour;
      select.appendChild(option);
    });

    select.disabled = false;
    document.getElementById('statusMessage').textContent = 'Selecciona un tour del menú para ver sus detalles.';

    select.addEventListener('change', renderResults);
  }

  function renderResults() {
    const selectedTour = document.getElementById('tourSelect').value;
    const resultsContainer = document.getElementById('results');
    resultsContainer.innerHTML = '';

    if (selectedTour === '') {
      resultsContainer.innerHTML = '<div class="loading">Selecciona un tour del menú para ver sus detalles.</div>';
      return;
    }

    // Filtrar todas las tarifas (Adulto, Menor, etc.) asociadas a ese tour específico
    const filtered = toursData.filter(item => item.tour.trim() === selectedTour);

    filtered.forEach(item => {
      const card = document.createElement('div');
      card.className = 'card';
      
      let html = `
        <div class="card-header">
          <div>
            <h3 class="tour-title">${item.tour}</h3>
            <div class="operator">${item.operator}</div>
          </div>
          <span class="passenger-type">${item.passenger}</span>
        </div>
        <div class="grid">
          <div><span>Precio Intl</span> ${item.intlPrice}</div>
          <div><span>Precio Nac</span> ${item.nacPrice}</div>
          <div><span>T. Cambio</span> ${item.exchange}</div>
        </div>
      `;

      if (item.notes && item.notes.trim() !== '') {
        html += `<div class="notes"><strong>Notas / Inclusiones:</strong> ${item.notes}</div>`;
      }

      card.innerHTML = html;
      resultsContainer.appendChild(card);
    });
  }
</script>
</body>
</html>
